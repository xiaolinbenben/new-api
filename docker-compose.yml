# terln-api Docker Compose 配置
#
# 前置条件:
#   1. 复制 .env.example 到 .env 并进行配置
#   2. 运行: docker-compose up -d
#
# ⚠️  重要提示: 部署到生产环境前，请修改所有默认密码!

version: '3.4'

services:
  caddy:
    image: caddy:2
    container_name: caddy
    restart: always
    depends_on:
      - terln-api
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - terln-api-network

  terln-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: terln-api:latest
    container_name: terln-api
    restart: always
    expose:
      - "3000"
    volumes:
      - ./data:/data
    environment:
      SQL_DSN: postgresql://root:${POSTGRES_PASSWORD}@postgres:5432/terln-api
      REDIS_CONN_STRING: redis://redis:6379
      SESSION_SECRET: ${SESSION_SECRET}
      CRYPTO_SECRET: ${CRYPTO_SECRET}
      TZ: ${TZ:-Asia/Shanghai}
      ERROR_LOG_ENABLED: "true"
      BATCH_UPDATE_ENABLED: "true"
    depends_on:
      - redis
      - postgres
    networks:
      - terln-api-network
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:3000/api/status | grep -o '\"success\":\\s*true' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: always
    networks:
      - terln-api-network

  postgres:
    image: postgres:15
    container_name: postgres
    restart: always
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: terln-api
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - terln-api-network

volumes:
  pg_data:
  caddy_data:
  caddy_config:

networks:
  terln-api-network:
    driver: bridge
