version: '3'

tasks:
  # 构建前端和后端
  build:
    desc: 构建前端和后端
    cmds:
      - echo "Building frontend..."
      - cd web && bun install && DISABLE_ESLINT_PLUGIN='true' VITE_REACT_APP_VERSION=$(cat ../VERSION 2>/dev/null || echo "dev") bun run build
      - echo "Building backend..."
      - CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o terln-api main.go
      - echo "Build complete!"

  # 构建前端
  build-frontend:
    desc: 构建前端
    cmds:
      - echo "Building frontend..."
      - cd web && bun install && DISABLE_ESLINT_PLUGIN='true' VITE_REACT_APP_VERSION=$(cat ../VERSION 2>/dev/null || echo "dev") bun run build
      - echo "Frontend build complete!"

  # 启动后端开发服务器
  start-backend:
    desc: 启动后端开发服务器
    cmds:
      - echo "Starting backend dev server..."
      - go run main.go

  # 构建前端并启动后端
  all:
    desc: 构建前端并启动后端
    cmds:
      - task: build-frontend
      - task: start-backend

  # 启动 Docker Compose 服务
  up:
    desc: 启动 Docker Compose 服务
    cmds:
      - docker-compose up -d

  # 停止 Docker Compose 服务
  down:
    desc: 停止 Docker Compose 服务
    cmds:
      - docker-compose down

  # 查看日志
  logs:
    desc: 查看 Docker Compose 日志
    cmds:
      - docker-compose logs -f

  # 重新构建并重启服务
  rebuild:
    desc: 重新构建并重启服务
    cmds:
      - task: build
      - task: down
      - task: up

  # 重启服务
  restart:
    desc: 重启 Docker Compose 服务
    cmds:
      - docker-compose restart

  # 启动测试工作台
  workbench:
    desc: 启动测试工作台
    cmds:
      - cd tools/test-workbench && go run . serve

  # 启动测试工作台（使用默认数据目录）
  workbench-dev:
    desc: 启动测试工作台开发环境
    cmds:
      - cd tools/test-workbench && go run . serve --admin-port 18880 --data-dir ./data

  # 启动测试工作台（使用全新临时数据目录，便于回归测试）
  workbench-clean:
    desc: 启动全新测试工作台实例
    cmds:
      - mkdir -p /tmp/new-api-test-workbench
      - rm -rf /tmp/new-api-test-workbench/*
      - cd tools/test-workbench && go run . serve --admin-port 18880 --data-dir /tmp/new-api-test-workbench

  # 只构建测试工作台前端
  workbench-web-build:
    desc: 构建测试工作台前端
    cmds:
      - cd tools/test-workbench/web && bun install && bun run build

  # 只运行测试工作台 Go 测试
  workbench-test:
    desc: 运行测试工作台 Go 测试
    cmds:
      - go test ./tools/test-workbench/...

  # 构建并验证测试工作台
  workbench-check:
    desc: 构建并验证测试工作台
    cmds:
      - task: workbench-web-build
      - task: workbench-test
      - go build ./tools/test-workbench

  # 构建测试工作台
  workbench-build:
    desc: 构建测试工作台
    cmds:
      - task: workbench-web-build
      - cd tools/test-workbench && go build -o test-workbench .
